<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution LMS: Log in</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background-color: #f7f8f9; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #1d2125; }
        .login-wrapper { width: 340px; }
        .login-container { background: #fff; border: 1px solid #e5e9ec; border-radius: 8px; padding: 2.5rem; text-align: center; }
        .logo { max-width: 140px; margin-bottom: 2rem; }
        .login-header { font-size: 24px; font-weight: normal; margin-top: 0; margin-bottom: 1.5rem; text-align: left; }
        .alert-box { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 1rem; text-align: left; font-size: 14px; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #caced1; border-radius: 4px; font-size: 14px; box-sizing: border-box; background-color: #e8f0fe !important; } /* Match light blue background in image_2.png */
        input:focus { border-color: #1a73e8; outline: none; background-color: #fff !important; }
        .login-btn { width: auto; background-color: #1a2a47; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; font-weight: normal; cursor: pointer; transition: background-color 0.2s; font-size: 14px; display: block; }
        .login-btn:hover { background-color: #2c4470; }
        .lost-password { text-align: left; margin-top: 1rem; font-size: 14px; color: #000; text-decoration: underline; }
        .lost-password a { color: inherit; text-decoration: inherit; }
        .lost-password a:hover { color: #1a73e8; }
        .google-section { margin-top: 2rem; border-top: 1px solid #e5e9ec; padding-top: 1.5rem; }
        .google-header { color: #6a737c; font-size: 14px; font-weight: bold; margin-bottom: 1rem; text-align: left; }
        .google-btn { display: inline-flex; align-items: center; border: 1px solid #caced1; border-radius: 4px; padding: 6px 12px; cursor: pointer; text-decoration: none; color: #000; font-size: 14px; transition: background-color 0.2s; }
        .google-btn:hover { background-color: #f7f8f9; }
        .google-icon { font-size: 16px; margin-right: 8px; color: #4285F4; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <img src="https://via.placeholder.com/120x120.png?text=College+Logo" alt="College Logo" class="logo">
            
            <h1 class="login-header">Log in</h1>

            {% if error %}
                <div class="alert-box">
                    <i class="fas fa-exclamation-triangle" style="margin-right: 5px;"></i> {{ error }}
                </div>
            {% endif %}

            <form action="/track/login" method="POST">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="input-group">
                    <input type="text" name="username" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" id="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="login-btn">Log in</button>
            </form>

            <div class="lost-password">
                <a href="#">Lost password?</a>
            </div>

            <div class="google-section">
                <div class="google-header">Log in using your account on:</div>
                <a href="/track/login/google?token={{ token }}" class="google-btn">
                    <i class="fab fa-google google-icon"></i> Google
                </a>
            </div>
        </div>
    </div>
</body>
</html>
